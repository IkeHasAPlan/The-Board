services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: board
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./models/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./models/triggers.sql:/docker-entrypoint-initdb.d/02-triggers.sql:ro
      - ./models/seed.sql:/docker-entrypoint-initdb.d/03-seed.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d board"]
      interval: 3s
      timeout: 3s
      retries: 20

  app:
    build: .
    environment:
      PGHOST: db
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: board
      PGPORT: 5432
    ports:
      - "127.0.0.1:3001:3001"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
