<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
* {
  box-sizing: border-box;
}

.app-title {
  margin: 10px 0 0;
  font-size: 1.8rem;
}

.app-subtitle {
  margin: 0px 0 0;
  font-size: 1.1rem;
  color: #888;
}

body {
  font-family: system-ui, Arial, sans-serif;
  background: #0b1f3a;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  color: #f5f7fa;
}

.login-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 22px;
}

.logo {
  width: 360px;
  max-width: 85vw;
  height: auto;
}

.login-box {
  background: #111827;
  border: 1px solid #243047;
  border-radius: 16px;
  padding: 36px;
  width: 360px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
}

.login-box h2 {
  margin: 0 0 20px 0;
  text-align: center;
  font-size: 28px;
  color: #ffffff;
}

.input-group {
  width: 100%;
}

input {
  width: 100%;
  padding: 12px 14px;
  margin: 10px 0;
  border: 1px solid #334155;
  border-radius: 10px;
  background: #1e293b;
  color: #f8fafc;
  font-size: 15px;
  outline: none;
}

input::placeholder {
  color: #94a3b8;
}

input:focus {
  border-color: #60a5fa;
  box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.15);
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  transition: background 0.2s ease, transform 0.2s ease;
}

button:hover {
  background: #1d4ed8;
  transform: translateY(-1px);
}

#error {
  color: #f87171;
  margin-top: 14px;
  text-align: center;
  min-height: 20px;
}

.hint {
  margin-top: 18px;
  font-size: 12px;
  color: #94a3b8;
  text-align: center;
  line-height: 1.5;
}
</style>
</head>
<script src="/session-timeout.js"></script>
<body>

<div class="login-wrapper">

  <img src="/logo.png" alt="Columbia Computer Center Logo" class="logo">
  <h1 class="app-title">The Board</h1>
  <p class="app-subtitle">Workflow Manager</p>
  <div class="login-box">
    <h2>Login</h2>

    <div class="input-group">
      <input id="username" placeholder="Username">
      <input id="password" type="password" placeholder="Password">
    </div>

    <button id="loginButton" onclick="login()">Login</button>

    <div id="error"></div>

    <div class="hint">

    </div>
  </div>
</div>

<script>
async function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const errorEl = document.getElementById("error");

  errorEl.textContent = "";

  try {
    const res = await fetch("/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (!res.ok) {
      errorEl.textContent = data.error || "Login failed.";
      return;
    }

    sessionStorage.setItem("userRole", data.role);
    sessionStorage.setItem("displayName", data.displayName || username);

    window.location.href = "/home.html";
  } catch (err) {
    errorEl.textContent = "Could not reach server.";


  }
}

document.addEventListener("keydown", function (event) {
  if (event.key === "Enter") {
    event.preventDefault();
    login();
  }
});
</script>

</body>
</html>
