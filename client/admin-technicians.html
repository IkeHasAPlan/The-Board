<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Technicians</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: system-ui, Arial, sans-serif;
  background: #0b1f3a;
  color: #f8fafc;
  padding: 24px;
}

.page {
  max-width: 1100px;
  margin: 0 auto;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 22px;
  gap: 12px;
  flex-wrap: wrap;
}

.back-button,
.logout-btn,
.primary-btn,
.secondary-btn,
.danger-btn {
  text-decoration: none;
  border-radius: 10px;
  padding: 10px 16px;
  font-weight: 700;
  cursor: pointer;
  border: 1px solid #243047;
  transition: all 0.2s ease;
  font-size: 14px;
}

.back-button,
.logout-btn,
.secondary-btn {
  background: #111827;
  color: #f8fafc;
}

.back-button:hover,
.logout-btn:hover,
.secondary-btn:hover {
  border-color: #3b82f6;
  background: #172033;
}

.primary-btn {
  background: #2563eb;
  color: white;
  border: none;
}

.primary-btn:hover {
  background: #1d4ed8;
}

.danger-btn {
  background: rgba(239, 68, 68, 0.14);
  color: #fca5a5;
  border-color: rgba(239, 68, 68, 0.3);
}

.danger-btn:hover {
  background: rgba(239, 68, 68, 0.2);
}

.danger-btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

.branding {
  text-align: center;
  margin-bottom: 24px;
}

.logo {
  width: 340px;
  max-width: 90%;
  margin-bottom: 10px;
}

h1 {
  margin: 0;
  font-size: 36px;
}

.subtitle {
  color: #94a3b8;
  margin-top: 8px;
}

.toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
  gap: 12px;
  flex-wrap: wrap;
}

.toolbar-left {
  color: #cbd5e1;
  font-weight: 600;
}

.panel {
  background: #111827;
  border: 1px solid #243047;
  border-radius: 18px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.25);
  overflow: hidden;
}

.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th,
td {
  padding: 16px 14px;
  text-align: left;
  border-bottom: 1px solid #243047;
}

th {
  background: #172033;
  color: #cbd5e1;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

td {
  color: #f8fafc;
  font-size: 14px;
}

tr:last-child td {
  border-bottom: none;
}

.badge {
  display: inline-flex;
  align-items: center;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 800;
}

.badge-active {
  background: rgba(34, 197, 94, 0.14);
  color: #86efac;
  border: 1px solid rgba(34, 197, 94, 0.3);
}

.badge-inactive {
  background: rgba(148, 163, 184, 0.14);
  color: #cbd5e1;
  border: 1px solid rgba(148, 163, 184, 0.3);
}

.action-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.note,
.status-message {
  margin-top: 16px;
  color: #94a3b8;
  font-size: 14px;
  line-height: 1.5;
}

.status-message.success {
  color: #86efac;
}

.status-message.error {
  color: #fca5a5;
}
</style>
</head>

<body>
  <div class="page">
    <div class="topbar">
      <a href="/home.html" class="back-button">← Back to Dashboard</a>
      <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>

    <div class="branding">
      <img src="/logo.png" alt="Columbia Computer Center Logo" class="logo">
      <h1>Manage Technicians</h1>
      <div class="subtitle">Add, edit, reactivate, or deactivate board technicians.</div>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">Technician Directory</div>
      <button class="primary-btn" onclick="addTechnician()">+ Add Technician</button>
    </div>

    <div class="panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Role</th>
              <th>Status</th>
              <th>Assigned Tickets</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="technicianTableBody">
            <tr>
              <td colspan="5">Loading technicians...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div id="statusMessage" class="status-message"></div>

    <div class="note">
      Editing an inactive technician lets you reactivate them. Active technicians appear as columns on the board.
    </div>
  </div>

<script>
function guardAdmin() {
  const role = sessionStorage.getItem("userRole");
  if (role !== "admin") {
    window.location.href = "/home.html";
  }
}

function logout() {
  sessionStorage.removeItem("userRole");
  sessionStorage.removeItem("displayName");
  window.location.href = "/index.html";
}

function setMessage(text, type = "") {
  const el = document.getElementById("statusMessage");
  el.textContent = text;
  el.className = `status-message ${type}`;
}

function escapeForOnClick(value) {
  return String(value).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
}

async function loadTechnicians() {
  const body = document.getElementById("technicianTableBody");

  try {
    const res = await fetch("/technicians");
    const technicians = await res.json();

    if (!res.ok) {
      throw new Error(technicians.error || "Failed to load technicians.");
    }

    if (!technicians.length) {
      body.innerHTML = `
        <tr>
          <td colspan="5">No technicians found.</td>
        </tr>
      `;
      return;
    }

    body.innerHTML = technicians.map((tech) => `
      <tr>
        <td>${tech.name}</td>
        <td>Technician</td>
        <td>
          <span class="badge ${tech.is_active ? "badge-active" : "badge-inactive"}">
            ${tech.is_active ? "Active" : "Inactive"}
          </span>
        </td>
        <td>${tech.assigned_tickets ?? 0}</td>
        <td>
          <div class="action-group">
            <button
              class="secondary-btn"
              onclick="editTechnician(${tech.technician_id}, '${escapeForOnClick(tech.name)}', ${tech.is_active})"
            >
              Edit
            </button>

            <button
              class="danger-btn"
              ${tech.is_active ? "" : "disabled"}
              onclick="deactivateTechnician(${tech.technician_id}, '${escapeForOnClick(tech.name)}', ${tech.assigned_tickets ?? 0})"
            >
              Deactivate
            </button>
          </div>
        </td>
      </tr>
    `).join("");
  } catch (err) {
    console.error(err);
    body.innerHTML = `
      <tr>
        <td colspan="5">Failed to load technicians.</td>
      </tr>
    `;
  }
}

async function addTechnician() {
  const name = window.prompt("Enter technician name:");

  if (!name || !name.trim()) return;

  try {
    const res = await fetch("/technicians", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name: name.trim() })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || "Failed to add technician.");
    }

    setMessage(`${name.trim()} added successfully. Their column will appear on the board.`, "success");
    await loadTechnicians();
  } catch (err) {
    console.error(err);
    setMessage(err.message || "Failed to add technician.", "error");
  }
}

async function editTechnician(id, currentName, isActive) {
  const newName = window.prompt("Edit technician name:", currentName);

  if (!newName || !newName.trim()) return;

  let shouldReactivate = false;

  if (!isActive) {
    shouldReactivate = window.confirm(
      `${currentName} is currently inactive.\n\nDo you want to reactivate them and restore their board column?`
    );
  }

  try {
    const res = await fetch(`/technicians/${id}`, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: newName.trim(),
        isActive: shouldReactivate ? true : undefined
      })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || "Failed to update technician.");
    }

    setMessage(`${newName.trim()} updated successfully.`, "success");
    await loadTechnicians();
  } catch (err) {
    console.error(err);
    setMessage(err.message || "Failed to update technician.", "error");
  }
}

async function deactivateTechnician(id, name, assignedTickets) {
  const confirmed = window.confirm(
    `Deactivate ${name}?\n\nThis will remove their column from the board and move ${assignedTickets || 0} active ticket(s) back to Waiting to Start.`
  );

  if (!confirmed) return;

  try {
    const res = await fetch(`/technicians/${id}/deactivate`, {
      method: "PATCH"
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || "Failed to deactivate technician.");
    }

    setMessage(data.message || `${name} deactivated.`, "success");
    await loadTechnicians();
  } catch (err) {
    console.error(err);
    setMessage(err.message || "Failed to deactivate technician.", "error");
  }
}

guardAdmin();
loadTechnicians();
</script>
</body>
</html>
