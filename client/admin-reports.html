<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Performance Reports</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: system-ui, Arial, sans-serif;
  background: #0b1f3a;
  color: #f8fafc;
  padding: 24px;
}

.page {
  max-width: 1100px;
  margin: 0 auto;
}

.topbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

button, .back {
  background: #111827;
  border: 1px solid #243047;
  color: #fff;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
}

.branding {
  text-align: center;
  margin-bottom: 20px;
}

.logo {
  width: 300px;
}

h1 {
  margin: 10px 0 0;
}

.subtitle {
  color: #94a3b8;
  margin-bottom: 10px;
}

/* 🔥 FIXED METRICS LAYOUT */
.metrics-section {
  margin-bottom: 25px;
}

.metrics-label {
  color: #64748b;
  font-size: 13px;
  margin-bottom: 10px;
  text-align: center;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
}

.stat-card {
  background: #111827;
  border: 1px solid #243047;
  border-radius: 14px;
  padding: 18px;
  text-align: center;
}

.stat-label {
  color: #94a3b8;
  font-size: 12px;
}

.stat-value {
  font-size: 24px;
  font-weight: 700;
}

/* TABLE */
.table-section {
  margin-top: 20px;
}

.table-title {
  font-size: 18px;
  margin-bottom: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #111827;
  border: 1px solid #243047;
  border-radius: 10px;
  overflow: hidden;
}

th {
  background: #172033;
  color: #cbd5e1;
  padding: 12px;
  text-align: left;
  font-size: 12px;
}

td {
  padding: 12px;
  border-top: 1px solid #243047;
}

tr:hover {
  background: #172033;
}

</style>
</head>

<body>

<div class="page">

  <div class="topbar">
    <a href="/home.html" class="back">← Back</a>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="branding">
    <img src="/logo.png" class="logo">
    <h1>Performance Reports</h1>
    <div class="subtitle">Shop & Technician Metrics</div>
  </div>

  <!-- 🔥 METRICS SECTION -->
  <div class="metrics-section">

    <div class="metrics-label">
      Based on current work week (Mon–Sun), 8-hour workday model
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Jobs Completed</div>
        <div class="stat-value" id="jobsCompleted">--</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Avg Completion</div>
        <div class="stat-value" id="avgTime">--</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Open Jobs</div>
        <div class="stat-value" id="openJobs">--</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Common Job</div>
        <div class="stat-value" id="commonJob">--</div>
      </div>
    </div>

  </div>

  <!-- 🔥 TABLE SECTION -->
  <div class="table-section">
    <div class="table-title">Technician Performance</div>

    <table>
      <thead>
        <tr>
          <th>Technician</th>
          <th>Jobs Completed</th>
          <th>Avg Time</th>
          <th>Active Tickets</th>
          <th>Common Job</th>
        </tr>
      </thead>

      <tbody id="reportTable">
        <tr><td colspan="5">Loading...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
function logout() {
  sessionStorage.clear();
  window.location.href = "/index.html";
}

function guardAdmin() {
  if (sessionStorage.getItem("userRole") !== "admin") {
    window.location.href = "/home.html";
  }
}

async function loadSummary() {
  const res = await fetch('/reports/summary');
  const data = await res.json();

  document.getElementById("jobsCompleted").textContent = data.jobsCompletedThisWeek ?? '--';
  document.getElementById("avgTime").textContent =
    data.avgCompletionDays ? `${data.avgCompletionDays} days` : '--';
  document.getElementById("openJobs").textContent = data.openJobs ?? '--';
  document.getElementById("commonJob").textContent = data.mostCommonJobType ?? '--';
}

async function loadTechnicians() {
  const res = await fetch('/reports/technicians');
  const rows = await res.json();

  const body = document.getElementById("reportTable");

  body.innerHTML = rows.map(row => `
    <tr>
      <td>${row.technician || 'Unassigned'}</td>
      <td>${row.jobs_completed ?? 0}</td>
      <td>${row.avg_time ? `${row.avg_time} days` : '—'}</td>
      <td>${row.active_tickets ?? 0}</td>
      <td>${row.common_job || '--'}</td>
    </tr>
  `).join("");
}

guardAdmin();
loadSummary();
loadTechnicians();
</script>

</body>
</html>
